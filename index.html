<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okna Store - пластиковые окна</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page">
        <!-- Шапка сайта -->
        <header class="header">
            <div class="container">
                <nav class="nav">
                    <div class="nav-left">
                        <a href="/catalog.html" class="nav-btn">Каталог</a>
                        <a href="/services.html" class="nav-btn">Услуги</a>
                    </div>

                    <div class="logo">
                        <img src="images/logo.png" alt="Okna Store">
                    </div>

                    <div class="nav-right">
                        <a href="/calculator.html" class="nav-btn">Расчёт</a>
                        <a href="/contacts.html" class="nav-btn">Контакты</a>
                    </div>
                </nav>
            </div>
        </header>

<main>
    <!-- Первый экран -->
    <section class="hero">
        <div class="container">
            <!-- Белый контейнер с фото -->
            <div class="hero-content">
                <div class="hero-images">
                    <div class="image-stack">
                        <img src="images/window-2.jpg" alt="Окно" class="image image-front">
                        <img src="images/window-1.jpg" alt="Окно интерьер" class="image image-back">
                    </div>
                </div>
            </div>

            <!-- Невидимый блок для текста -->
                <div class="hero-text">
                    <h1 class="hero-title">ПЛАСТИКОВЫЕ ОКНА</h1>
                    <p class="hero-subtitle">по ценам 2024 года</p>
                </div>

                <!-- Отдельный блок для кнопки -->
                    <div class="promo-block">
                        <div class="promo-badge">30% скидка на первый заказ</div>
                </div>
                    <a href="#" class="promo-btn">Уже бегу!</a>
            </div>
    </section>

            <!-- Каталог товаров -->
            <section class="catalog">
                <div class="container">
                    <h2 class="section-title">Наши окна</h2>

                    <div class="catalog-grid">
                        <!-- Карточка 1 -->
                        <div class="product-card">
                            <img src="images/window-6.jpg" alt="Окно 1" class="product-img">
                            <h3 class="product-title">Окно ПВХ белое</h3>
                            <p class="product-price">15 900 ₽</p>
                            <button class="product-add">+</button>
                        </div>

                        <!-- Карточка 2 -->
                        <div class="product-card">
                            <img src="images/window-7.jpg" alt="Окно 2" class="product-img">
                            <h3 class="product-title">Окно ПВХ коричневое</h3>
                            <p class="product-price">17 500 ₽</p>
                            <button class="product-add">+</button>
                        </div>

                        <!-- Карточка 3 -->
                        <div class="product-card">
                            <img src="images/window-3.jpg" alt="Окно 3" class="product-img">
                            <h3 class="product-title">Окно ПВХ ламинат</h3>
                            <p class="product-price">21 900 ₽</p>
                            <button class="product-add">+</button>
                        </div>
                    </div>

                    <div class="catalog-footer">
                        <a href="/catalog.html" class="btn-link">Смотреть все окна →</a>
                    </div>
                </div>
            </section>
        </main>

        <!-- Подвал -->
        <footer class="footer">
            <div class="container">
                <div class="footer-content">
                    <div class="footer-info">
                        <p>© 2024 Okna Store</p>
                        <p>г. Москва, ул. Строителей, 15</p>
                    </div>
                    <div class="footer-phone">
                        <a href="tel:+74951234567">+7 (495) 123-45-67</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
