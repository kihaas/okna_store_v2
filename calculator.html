<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор стоимости окон - Okna Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page">
        <header class="header">
            <div class="container">
                <nav class="nav">
                    <div class="nav-left">
                        <a href="/catalog" class="nav-btn">Каталог</a>
                        <a href="/services" class="nav-btn">Услуги</a>
                    </div>

                    <div class="logo">
                        <a href="/">
                            <img src="images/logo.png" alt="Okna Store">
                        </a>
                    </div>

                    <div class="nav-right">
                        <a href="/calculator" class="nav-btn active">Расчёт</a>
                        <a href="/contacts" class="nav-btn">Контакты</a>
                    </div>
                </nav>
            </div>
        </header>

        <main>
            <section class="calculator">
                <div class="container">
                    <div class="calculator-card">
                        <h1 class="calculator-title">Рассчитайте стоимость окна</h1>

                        <form id="calculator-form" class="calculator-form">
                            <div class="form-grid">
                                <!-- Тип окна -->
                                <div class="form-group">
                                    <label class="form-label">Тип окна</label>
                                    <select id="window-type" class="form-select">
                                        <option value="plastic">Пластиковое</option>
                                        <option value="wood">Деревянное</option>
                                        <option value="aluminum">Алюминиевое</option>
                                    </select>
                                </div>

                                <!-- Размеры -->
                                <div class="form-group">
                                    <label class="form-label">Ширина (мм)</label>
                                    <input type="number" id="width" class="form-input" value="1200" min="400" max="3000">
                                </div>

                                <div class="form-group">
                                    <label class="form-label">Высота (мм)</label>
                                    <input type="number" id="height" class="form-input" value="1400" min="400" max="3000">
                                </div>

                                <!-- Количество створок -->
                                <div class="form-group">
                                    <label class="form-label">Количество створок</label>
                                    <select id="sashes" class="form-select">
                                        <option value="1">1 створка</option>
                                        <option value="2" selected>2 створки</option>
                                        <option value="3">3 створки</option>
                                    </select>
                                </div>

                                <!-- Стеклопакет -->
                                <div class="form-group">
                                    <label class="form-label">Стеклопакет</label>
                                    <select id="glass-type" class="form-select">
                                        <option value="1">Однокамерный</option>
                                        <option value="2" selected>Двухкамерный</option>
                                        <option value="3">Трёхкамерный</option>
                                    </select>
                                </div>

                                <!-- Дополнительные опции -->
                                <div class="form-group full-width">
                                    <label class="form-label">Дополнительные опции</label>
                                    <div class="options-grid">
                                        <label class="option-checkbox">
                                            <input type="checkbox" id="mosquito-net"> Москитная сетка (+1500 ₽)
                                        </label>
                                        <label class="option-checkbox">
                                            <input type="checkbox" id="windowsill"> Подоконник (+2000 ₽)
                                        </label>
                                        <label class="option-checkbox">
                                            <input type="checkbox" id="installation"> Установка (+5000 ₽)
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <!-- Результат -->
                            <div class="calculator-result">
                                <div class="result-price">
                                    <span class="result-label">Примерная стоимость:</span>
                                    <span class="result-value" id="total-price">25 900 ₽</span>
                                </div>
                                <button type="button" id="order-calc" class="result-btn">Заказать расчёт</button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>

            <!-- Форма заявки (скрытая) -->
            <section class="order-form" id="order-form" style="display: none;">
                <div class="container">
                    <div class="order-card">
                        <h2 class="order-title">Оставьте заявку</h2>
                        <p class="order-subtitle">Мы свяжемся с вами для уточнения деталей</p>

                        <form id="contact-form" class="contact-form">
                            <div class="form-row">
                                <input type="text" id="name" class="form-input" placeholder="Ваше имя" required>
                            </div>
                            <div class="form-row">
                                <input type="tel" id="phone" class="form-input" placeholder="Телефон" required>
                            </div>
                            <div class="form-row">
                                <textarea id="message" class="form-textarea" placeholder="Комментарий (необязательно)"></textarea>
                            </div>
                            <button type="submit" class="submit-btn">Отправить заявку</button>
                        </form>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="container">
                <div class="footer-content">
                    <div class="footer-info">
                        <p>© 2024 Okna Store</p>
                        <p>г. Москва, ул. Строителей, 15</p>
                    </div>
                    <div class="footer-phone">
                        <a href="tel:+74951234567">+7 (495) 123-45-67</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script src="js/calculator.js"></script>
</body>
</html>
